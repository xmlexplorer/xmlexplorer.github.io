name: Build Cross-Platform Engine Benchmark

on:
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Genuinely Intel hardware, not Apple Silicon cross-compiling to x86_64:
          # pkg-config can't safely cross-target libxml2 from an arm64 host (it
          # refuses rather than risk linking the wrong architecture), so this
          # needs to be a native build.
          - os: macos-13
            target: x86_64-apple-darwin
            label: mac-x64-intel
          - os: macos-latest
            target: aarch64-apple-darwin
            label: mac-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: win-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libclang-dev

      - name: Install libxml2 (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: vcpkg install libxml2:x64-windows-static-md

      - name: Build benchmark
        run: cargo build --release --manifest-path bench/Cargo.toml --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          BIN="bench/target/${{ matrix.target }}/release/xmlexplorer-bench"
          [ -f "$BIN.exe" ] && BIN="$BIN.exe"
          cp "$BIN" "dist/"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: xmlexplorer-bench-${{ matrix.label }}
          path: dist/*
