name: Build Cross-Platform Engine Benchmark

on:
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            label: mac-x64-intel
          - os: macos-latest
            target: aarch64-apple-darwin
            label: mac-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: win-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libclang-dev

      - name: Install libxml2 (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          vcpkg install libxml2:x64-windows-static-md
          # The vcpkg crate looks for VCPKG_ROOT specifically; GH runners only
          # set VCPKG_INSTALLATION_ROOT by default.
          echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"
          echo "VCPKGRS_TRIPLET=x64-windows-static-md" >> "$GITHUB_ENV"

      - name: Point libxml2 at the macOS SDK (cross-compiling to x86_64 from arm64)
        if: matrix.target == 'x86_64-apple-darwin'
        run: echo "LIBXML2=$(xcrun --sdk macosx --show-sdk-path)/usr/lib/libxml2.tbd" >> "$GITHUB_ENV"

      - name: Build benchmark
        run: cargo build --release --manifest-path bench/Cargo.toml --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          BIN="bench/target/${{ matrix.target }}/release/xmlexplorer-bench"
          [ -f "$BIN.exe" ] && BIN="$BIN.exe"
          cp "$BIN" "dist/"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: xmlexplorer-bench-${{ matrix.label }}
          path: dist/*
